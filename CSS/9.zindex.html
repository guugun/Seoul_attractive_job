<!DOCTYPE html>

<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>Document</title>
        <style>
            div{width: 100px; height: 100px; color: white; position: relative;}
            .div1{background-color: orange; z-index: 4;}/* z-index의 숫자가 클수록 우선순위가 높음. */
            .div2{background-color: red; bottom:50px; z-index: 3;}
            .div3{background-color: blue;bottom: 100px; z-index: 2;}
            .div4{background-color: yellow;bottom:150px; z-index: 1;}
            /*한마디로, z-index는 요소가 겹쳤을 때 어떤 요소가 위에 보이는지를 결정하는 속성입니다.
             z-index의 값이 높을수록 해당 요소가 다른 요소들보다 위에 표시됩니다. 
             따라서, z-index의 숫자가 클수록 우선순위가 높아집니다. */
             /*important는 CSS에서 특정 속성의 우선순위를 강제로 높이는 방법인데, 강사님말씀하시길 제발 쓰지말라함.
             나중에 사람들이 바이브코딩할때 서로 내꺼가 가장우선순위에 오게해달라고 짜달라하면 저렇게 짜줌
             그러면 서로 저걸로 important끼리 겹치면 오류뜰수도있음. 대신 z-index를 사용하고, 숫자를999이런식으로 주기.
             중요한 우선순위의한해서.*/
        </style>
    </head>

    <body>
        <h1>z-index 우선순위</h1>
        <div class="div1">ORANGE</div>
        <div class="div2">RED </div>
        <div class="div3">BLUE</div>
        <div class="div4"> YELLOW</div>
    </body>
</html>
