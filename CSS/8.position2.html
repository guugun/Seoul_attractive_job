<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .center{
            background-color: orangered;
        }

        .fixed{
            width: 100px;
            height: 100px;
            background-color: teal;
            background-image: url(images/starbucks.jpg);
            background-size: 100% 100%;
            position: fixed;
            bottom: 50px;
            right: 50px;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="bg center"></div>
    <div class="bg"></div>
    <div class="fixed"></div>

    <script>
        const elem = document.querySelector('.fixed');
        elem.onclick = () => { /* 이미지를 클릭하는 이벤트가 발생했을 때 실행할 코드 */
            elem.style.transform = elem.style.transform === 'scale(0.2)' ? 
            'scale(1)' : 'scale(0.2)';
        };
    
    </script>
</body>
</html>
