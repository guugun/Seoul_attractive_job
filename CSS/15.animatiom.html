<!DOCTYPE html> <!--쌤코드보고 뭐가잘못되고 다른지 확인하기.-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 100px; /*너비*/
            height: 100px;/*높이*/
            background-color: red;

            animation-name: moveLeft; /*애니메이션 이름*/
            animation-duration: 2s; /*애니메이션 지속 시간*/
            animation-iteration-count: infinite;    /*애니메이션 반복 횟수*/
            animation-direction: alternate; /*애니메이션 방향*/;
            animation-timing-function: linear;
            position: relative;
        }

        @keyframes moveLeft {
            0% { left:0;}
            50% { left:200; }
            100% { left:0; }
        }

        .text{
            color:black;
            animation-name: fadeOut;
            animation-duration: 1.5s;

            animation-delay: 2s;
            animation-timing-function: linear;
            animation-iteration-count: 3;

        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        .circle{
            width: 100px;
            height: 100px;
            background-color: blue;
            border-radius: 50px;
            border-radius: 20%;

            animation-name: rotateAndScale;
            animation-duration: 3s;

        }

        @keyframes rotateAndScale {
            0% {
                transform: rotate(0deg) scale(1);
            }
            50% {
                transform: rotate(180deg) scale(1.5);
            }
            100% {
                transform: rotate(360deg) scale(1);
            }
        }   

        .image{
            width:200px;
            
        }
    </style>
</head>
<body>
    <Div class="box"></Div>
    <hr>
    <p class="text">페이드 아웃 글자효과  </p>
    <div class="circle"></div>
    <hr>
    <img class="image">
</body>
</html>
