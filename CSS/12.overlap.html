<!DOCTYPE html> <!--쌤코드랑 비교좀해보기. 박스크기달라서 체크해보기-->
<html>
    <head>
        <meta charset="UTF-8">
     <title> Document </title>
    <!-- HTML 주석 -->
    <style>
        .container {
            margin:30px;
        }
        .box1, .box2 {

            width: 100%;
            height: 100%;
            text-align: center;
            background-color: rgba(63, 149, 225, 0.5); /* 반투명 파란색 */
            opacity: 0.6; /* 투명도 설정 (0.0 ~ 1.0) */
        }
        .box2 {
            background-color: rgba(40, 203, 148, 0.5); /* 반투명 초록색 */

        }
        .overlay{
            position: absolute;
            top: 200px;
            
        }

        .box1:hover{
            z-index: 5;
            opacity: 1.0;
            transform-style: all;
            transition-duration: 2s;
        }
    </style>
    </head>
    <body>
        <div class="container">
            <div class="box1">상단 영역</div>
            <div class="box2">하단 영역</div>
        </div>
    </body>
</html>
