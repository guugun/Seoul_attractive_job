<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .square{
            width: 100px;
            height: 100px;
            background-color: red;

            transition-property: width, height; /*변화할 속성*/
            transition-duration: 1.5s; /*변화하는데 걸리는 시간*/
            transition-timing-function: cubic-bezier(0.175, 0.885, 0.32, 1.275); /*변화하는 속도*/
            transition-delay: 0.5s; /*변화가 시작되기 전 대기 시간*/
        }

        .square:hover{
            width: 150px;
            height: 150px;
        }
        .button{
            color: black;
            transition-property: color;
            transition-duration: 1.5s;
            transition-timing-function: ease-in-out;
        }
        .button:hover{
            color: blue;
        }
        .image{
            width: 300px;
            height: 200px;
            transition-property: transform; /*모든 속성에 대해 변화*/
            transition-duration: 1.0s; /*변화하는데 걸리는 시간*/
        }
        .image:hover{
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <div class="square"></div>
    <br>
    <button class="button">마우스를 올려보세요</button>
    <image class="image" src="/images/cat1.jpeg">
</body>
</html>
