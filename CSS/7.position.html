<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
     <title> Document</title>
    <!-- HTML 주석 -->
    <style>
        div{
            width: 100px;
            height: 100px;
            color: white;
            background-color: orange;
            margin: 5px;
        }
        .location{
            background-color: orangered;
            position: absolute;
            top: 50px;
            left:50px;
        }
        .image{
            width: 300px;
            height: 200px;
            background-image: url(images/cat1.jpeg);
            background-size: 100%;
        }
        .image-text{
            top: 50px;
            left: 50px;
        }
    </style>
    </head>
    <body>
        <div>1</div>
        <div class="location">2</div>
        <div class="image">
            <p class="image-text">고양이</p>

        </div>
    </body>
</html>
