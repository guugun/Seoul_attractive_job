<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사용자 관리</title>
</head>
<body>
    <h1>사용자</h1>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p style="color: green;">{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <h2>사용자 추가</h2>
    <form action="/add" method="POST">
        <input type="text" name="name" placeholder="이름">
        <input type="number" name="age" placeholder="나이">
        <button type="submit">사용자 추가</button>
    </form>
    <h2>사용자 목록</h2>
    <ul>
        {% for user in users %}
            <li>{{ user.id }} - {{ user.name }}, {{ user.age }}
                <a href="{{ url_for('profile', id=user.id) }}">프로필</a>
                <a href="{{ url_for('edit_user', id=user.id) }}">수정</a>
                <a href="{{ url_for('delete_user', id=user.id) }}" onclick="return confirm('정말 삭제하시겠습니까?')">삭제</a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
