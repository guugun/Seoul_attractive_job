<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로필 조회</title>
</head>
<body>
    <h1>프로필 조회</h1>

    <p><strong>ID:</strong> {{ user.id }}</p>
    <p><strong>이름:</strong> {{ user.name }}</p>
    <p><strong>나이:</strong> {{ user.age }}</p>

    <a href="{{ url_for('edit_user', id=user.id) }}">수정하기</a> |
    <a href="{{ url_for('delete_user', id=user.id) }}" onclick="return confirm('정말 탈퇴하시겠습니까?')">회원탈퇴</a> |
    <a href="{{ url_for('index') }}">목록으로</a>
</body>
</html>
