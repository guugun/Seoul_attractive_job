<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코드 취약점 분석기</title>
</head>
<body>
    <h1>코드 취약점 분석기</h1>

    <div id="urlSection">
        <input type="text" id="githubUrl" placeholder="GitHub URL 붙여넣기 (예: https://github.com/user/repo/blob/main/file.py)" style="width:80%">
        <button id="fetchBtn">코드 가져오기</button>
    </div><br>

    <form id="codeForm">
        <textarea id="code" name="code" rows="15" cols="80" placeholder="소스코드를 입력하세요"></textarea><br>

        <div id="owaspSection">
            <strong>진단할 취약점 유형 선택 (OWASP Top 10)</strong>
            <div style="margin-top:8px">
                <label><input type="checkbox" name="vuln" value="A01 - Broken Access Control (접근 제어 취약점)"> A01 - Broken Access Control</label><br>
                <label><input type="checkbox" name="vuln" value="A02 - Cryptographic Failures (암호화 실패)"> A02 - Cryptographic Failures</label><br>
                <label><input type="checkbox" name="vuln" value="A03 - Injection (SQL Injection, XSS 등)"> A03 - Injection (SQL Injection, XSS 등)</label><br>
                <label><input type="checkbox" name="vuln" value="A04 - Insecure Design (안전하지 않은 설계)"> A04 - Insecure Design</label><br>
                <label><input type="checkbox" name="vuln" value="A05 - Security Misconfiguration (보안 설정 오류)"> A05 - Security Misconfiguration</label><br>
                <label><input type="checkbox" name="vuln" value="A06 - Vulnerable and Outdated Components (취약한 컴포넌트)"> A06 - Vulnerable and Outdated Components</label><br>
                <label><input type="checkbox" name="vuln" value="A07 - Identification and Authentication Failures (인증 실패)"> A07 - Identification and Authentication Failures</label><br>
                <label><input type="checkbox" name="vuln" value="A08 - Software and Data Integrity Failures (무결성 실패)"> A08 - Software and Data Integrity Failures</label><br>
                <label><input type="checkbox" name="vuln" value="A09 - Security Logging and Monitoring Failures (로깅 실패)"> A09 - Security Logging and Monitoring Failures</label><br>
                <label><input type="checkbox" name="vuln" value="A10 - Server-Side Request Forgery (SSRF)"> A10 - Server-Side Request Forgery (SSRF)</label><br>
            </div>
            <small>※ 아무것도 선택하지 않으면 전체 취약점을 분석합니다.</small>
        </div><br>

        <button type="submit">분석시작</button>
    </form>
    <h2>분석 결과</h2>
    <pre id="result"><!--결과가 출력될곳--></pre>
    <script>
        // GitHub URL → 소스코드 자동 가져오기
        document.getElementById('fetchBtn').addEventListener('click', async () => {
            const url = document.getElementById('githubUrl').value;
            if (!url) return alert('GitHub URL을 입력하세요.');

            const res = await fetch('/api/fetch-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });
            const data = await res.json();
            if (data.code) {
                document.getElementById('code').value = data.code;
            } else {
                alert(data.error || '코드를 가져오지 못했습니다.');
            }
        });

        document.getElementById('codeForm').addEventListener('submit', async (ev) => {
            ev.preventDefault();
            const code = document.getElementById('code').value;
            const result = document.getElementById('result');

            // 선택된 취약점 유형 수집
            const checked = document.querySelectorAll('input[name="vuln"]:checked');
            const vulnTypes = Array.from(checked).map(cb => cb.value);

            // 1. fetch 로 POST로 소스코드 내용을 다 보낸다. application/json 으로 보낸다.
            const response = await fetch("/api/codecheck", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code, vulnTypes })
            });
            const data = await response.json();
            console.log(data);

            // 2. 결과를 받아와서 result에 출력한다.
            result.innerText = data.result;
        })
    </script>
</body>
</html>
