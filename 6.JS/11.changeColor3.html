<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="text">색상 변경 버튼</h1>


    <button onclick="changeColor()">색상 변경</button>
    <script>
        //Math.random()은 0이상 1미만의 랜덤한 숫자를 반환하는 함수
        //이번 코드에선 rgb값을 랜덤하게 만들어서 배경색을 바꿔볼 것임
        function changeColor(){
            //document.body.style.backgroundColor = Math.random()
            const r = Math.floor(Math.random() * 256); //0~255까지의 랜덤한 정수
            const g = Math.floor(Math.random() * 256);  
            const b = Math.floor(Math.random() * 256);

            //hex 코드로 바꾸기
            const rHex = r.toString(16).padStart(2, '0'); //16진수로 변환하고, 2자리로 맞추기
            const gHex = g.toString(16).padStart(2, '0'); //.toString() : 숫자 → 문자열로 변환하는 메서드
            const bHex = b.toString(16).padStart(2, '0'); // padStart(2, '0');는 6자리로 문자길이 고정시키려고쓰는것.
        
            const finalColor = '#' + rHex + gHex + bHex;

            document.body.style.backgroundColor = finalColor;   
            console.log(finalColor);
        }

    </script>
</body>
</html>
