<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1e1e2f;
            font-family: Arial, sans-serif;
        }

        .stopwatch-box {
            background: #2c2c3e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 300px;
        }

        #display {
            font-size: 40px;
            color: #00ffcc;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        .button-container {
            display: flex;
            justify-content: space-between;
        }

        button {
            flex: 1;
            margin: 0 5px;
            padding: 10px;
            font-size: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        #startButton {
            background: #4caf50;
            color: white;
        }

        #stopButton {
            background: #f44336;
            color: white;
        }

        #resetButton {
            background: #2196f3;
            color: white;
        }

        button:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <!-- 스톱워치 전체 -->
    <div class="stopwatch-box">
        <!-- 스탑워치 표시 영역 -->
        <div id="display">00:00.00</div>
        <!-- 스탑워치 버튼 컨테이너 -->
        <div class="button-container">
            <button id="startButton">시작</button>
            <button id="stopButton">중지</button>
            <button id="resetButton">초기화</button>
        </div>
    </div>
    <script>
        // 1. DOM요소를 다 가져온다
        const display = document.getElementById('display');
        const startButton = document.getElementById('startButton');
        const stopButton = document.getElementById('stopButton');
        const resetButton = document.getElementById('resetButton');

        let startTime; // 스톱워치 시작 시간
        let difference = 0; // 경과 시간
        let running = false; // 현재 타이머 상태

        function startTimer() {
            if (running) return;

            running = true;
            startTime = new Date().getTime();
            timerId = setInterval(updateTimer, 10);
        }

        function updateTimer() {
            updatedTime = new Date().getTime();
            difference = updatedTime - startTime; // 경과 시간 계산. 시간단위는 ms (밀리세컨드)

            //주의: 현재 hours를 표시하는 기능은 기존에 쌤한테 받은코드엔 없었음.
            //그래서 61분이 되면 01:00.00 이런식으로 표시됨. 
            // 이걸 고치려면, hours 계산하는 코드도 추가해야함. 
            // 근데 아직 지시사항에 없었어서 아직 안넣음
            let minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60)); // 흘러간 ms 에서 분 계산
            let seconds = Math.floor((difference % (1000 * 60)) / (1000)); // 거기에서 초 계산
            let milliseconds = Math.floor((difference % 1000) / 10); // 나머지 ms 계산

            // console.log(`흘러간 시간 계산 ${minutes}분, ${seconds}초, ${milliseconds}ms`)
            display.textContent = 
                (minutes < 10 ? '0' + minutes : minutes) + ':' +
                (seconds < 10 ? '0' + seconds : seconds) + '.' +
                (milliseconds < 10 ? '0' + milliseconds : milliseconds);
        }

        function stopTimer() {
            if (!running) return;

            running = false;
            clearInterval(timerId); //반복중지

            //let differerence = 
        }

        function resetTimer(){
            clearInterval(timerId); //반복중지
            running = false;
            difference = 0; //사실상 없어도 동작은 같음
            // 이걸 굳이 쓴 이유는 "리셋하면 모든 상태를 초기화한다" 는 코드 가독성/명확성 때문
            // 실용적 목적보다는 코드를 읽는 사람이 보기 좋으라고 쓰는 방어적 스타일임.
            display.textContent = '00:00.00'; // 초기화 버튼을 눌렀을 때, 화면에 표시되는 시간도 초기화해주는 코드. 이걸 안쓰면, 리셋버튼을 눌러도 화면에는 마지막에 멈춘 시간이 계속 표시됨.

        }
        startButton.addEventListener('click', startTimer);
        stopButton.addEventListener('click', stopTimer);
        resetButton.addEventListener('click', resetTimer);
    </script>
</body>
</html>
