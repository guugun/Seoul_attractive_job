<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        h1{
            text-align: center;
        }

        .slider{
            display: flex;
            flex-direction: column;
            margin: 0 auto;/*상하 좌우*/
            max-width: 600px;
            align-items: center;
        }
        .slider img{
            max-width: 100%;
            height: 300px;
            display: none;

        }

        .slider img.active{
            display: block;
        }

        .buttons{
            margin-top: 20px;
        }

        button{
            padding: 10px;
            font-size: 16px;
           
        }

    </style>

</head>
<body>
    <h1>이미지 슬라이더</h1>

    <div class="slider">
        <img id="img1" src="images/cat1.jpeg" class="active" >
        <img id="img2" src="images/cat2.png" >
        <img id="img3" src="images/cat3.png">

        <div class="filename" id="filename" > images/cat1.jpg</div>

        <div class="buttons">
            <button id="prevBtn">이전</button>
            <button id="nextBtn">다음</button>
        </div>
    </div>

    <script>
    //1.클릭 이벤트를 등록한다
    //2.원하는 요소들을 가져온다
    //3. active를 원하는 곳으로 이동시킨다
    //4. 파일명도 변경한다

        const imgs = document.querySelectorAll('.slider img');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        let index =0;

        function show(direction){
            imgs[index].classList.remove('active');
            index += direction;

            if(index < 0) index = imgs.length -1;
            else if(index >= imgs.length) index = 0;

            imgs[index].classList.add('active');

            filename.textContent = imgs[index].src.split('/').slice(-2).join('/'); // 파일명 변경
            
            if(index + 1>= imgs.length) nextBtn.disabled = true;
            else nextBtn.disabled = false;

            if(index - 1 < 0) prevBtn.disabled = true;
            else prevBtn.disabled = false;
        
        }

 
        nextBtn.addEventListener('click', ()=>{show(1)});


        prevBtn.addEventListener('click', ()=>{show(-1)});


    </script>

</body>
</html>
