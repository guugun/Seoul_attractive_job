<!DOCTYPE html> <!--쌤 코드로 다시받기-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input{
            padding: 10px;
            font-size: 10px;
        }

        ul{
            list-style: none;
            padding: 0
        }

        li{
            padding:5px;
            font-size: 10px;
        }
    </style>
</head>

<body>
    <input type="text" id="myInput" placeholder="키를 입력하시오">
    <div id="displayKey"><!-- 눌린키를 표시할곳 --></div>

    <script>
        const displayKey = document.getElementById('displayKey');

        document.getElementById('myInput').addEventListener('keydown', (ev) => {
            displayKey.textContent = ev.key;
            // console.log('키가 입력됨: ', ev.key);
        });
    </script>
</body>

</html>
