<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>heyhello</h1>
    <script>
        function heyhello()
        {
            console.log("hey!!");
            document.write('HELLO!!');
            document.write("<p>");

            document.write('HELLO AGAIN!!');
            document.write("</p>");

            for(let i=1; i<=5; i++)
            {
                document.write("숫자: "+ i + "<br>");
            }
        }
        heyhello();
    </script>
</body>
</html>
