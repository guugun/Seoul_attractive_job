<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input {
            padding: 10px;
            font-size: 16px;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            padding: 5px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>실시간 검색 필터</h1>
    <input type="text" id="searchInput" placeholder="검색어...">
    <ul id="itemsList">
        <li>apple</li>
        <li>banana</li>
        <li>orange</li>
        <li>grape</li>
        <li>strawberry</li>
        <li>blueberry</li>
        <li>pineapple</li>
        <li>mango</li>
        <li>watermelon</li>
        <li>melon</li>
        <li>peach</li>
        <li>pear</li>
        <li>cherry</li>
        <li>kiwi</li>
        <li>lemon</li>
        <li>lime</li>
        <li>plum</li>
        <li>apricot</li>
        <li>fig</li>
        <li>pomegranate</li>
    </ul>
    <script>
        const searchInput = document.getElementById('searchInput');
        const itemsList = document.getElementById('itemsList');
        const items = itemsList.getElementsByTagName('li'); // 이 목록은 HTMLCollection

        searchInput.addEventListener('keyup', () => {
            // 필터링 구현
            const filter = searchInput.value.toLowerCase();

            /* legacy 한 for 반복 스타일
            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                const text = item.textContent;
                if (text.toLowerCase().includes(filter)) { // 소문자와 소문자로 비교해서 대소문자 구분없이 검색
                    item.style.display = '';
                } else {
                    item.style.display = 'none';
                }
            }
            */

            Array.from(items).forEach((item) => { //items는 HTMLCollection이므로, forEach를 바로 사용할 수 없어서 Array.from()을 통해서 배열로 변환
                // Array.from(items).forEach((item)  부분을 풀어서 쓰면, 
                // const itemArray = Array.from(items);
                // itemArray.forEach((item) => { ... }) 와 같은 형태가 됨
                //그래서 item은 items의 각 요소를 순회하면서 item.textContent로 텍스트를 가져와서,
                //  소문자로 변환한 후에 filter와 비교해서 포함 여부를 확인하는 로직이 됨
                const text = item.textContent;
                if (text.toLowerCase().includes(filter)) { //이부분을 풀어서쓰면,
                    // const lowerText = text.toLowerCase();
                    // const lowerFilter = filter.toLowerCase();
                    // if (lowerText.includes(lowerFilter)) { ... } 와 같은 형태가 됨

                    //한글로 해석하자면, filter에 담겨있는 검색어가 item의 텍스트에 포함되어 있는지를 확인하는 로직이 됨
                    
                    item.style.display = '';// 포함되어 있으면, display 속성을 ''로 설정해서 보이도록 함
                } else {
                    item.style.display = 'none';// 포함되어 있지 않으면, display 속성을 'none'으로 설정해서 숨김 처리  
                }
            })
        })
    </script>
</body>
</html>
