<!DOCTYPE html> <!--검색이 끝난 후 1초 후에 필터링이 되도록 구현-->
<!--실시간 검색필터 (디바운스) 숙제 완료한 코드. 내가작성함-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input {
            padding: 10px;
            font-size: 16px;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            padding: 5px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>실시간 검색 필터</h1>
    <input type="text" id="searchInput" placeholder="검색어...">
    <ul id="itemsList">
        <li>apple</li>
        <li>banana</li>
        <li>orange</li>
        <li>grape</li>
        <li>strawberry</li>
        <li>blueberry</li>
        <li>pineapple</li>
        <li>mango</li>
        <li>watermelon</li>
        <li>melon</li>
        <li>peach</li>
        <li>pear</li>
        <li>cherry</li>
        <li>kiwi</li>
        <li>lemon</li>
        <li>lime</li>
        <li>plum</li>
        <li>apricot</li>
        <li>fig</li>
        <li>pomegranate</li>
    </ul>
    <script>
        const searchInput = document.getElementById('searchInput');
        const items = document.querySelectorAll('#itemsList > li'); // NodeList 타입임

        let delay;

        searchInput.addEventListener('keyup', () => {
            clearTimeout(delay);

            delay = setTimeout(()=> {
            // 필터링 구현
            const filter = searchInput.value.toLowerCase();

            items.forEach((item) => 
            {
                item.style.display = 
                item.textContent.toLowerCase().includes(filter) ?  '' : 'none';
            })

        }, 1000); // 1초의 딜레이를 주어서, 사용자가 타이핑을 멈춘 후에 필터링이 되도록 구현
            
        });
        // 디바운스를 구현하기 (setTimeout을 통해서...)

        // [디바운스 동작 원리]
        // setTimeout은 1초를 기다리는 게 아니라, "1초 뒤에 실행해줘" 라고 예약만 하고 즉시 반환됨
        // 그래서 키를 누를 때마다 아래 순서가 즉시 실행됨:
        //   ① clearTimeout(delay) → 이전에 예약된 타이머 취소
        //   ② delay = setTimeout(...) → 새 타이머 예약 후 즉시 반환
        //
        // 예시:
        //   'a' 입력 → 타이머A 예약
        //   'ap' 입력 → 타이머A 취소 → 타이머B 예약
        //   'app' 입력 → 타이머B 취소 → 타이머C 예약
        //   (1초 동안 입력 없음) → 타이머C 실행 (필터링 1번만 됨)
        //
        // delay 변수에 담는 이유:
        //   clearTimeout(delay)가 "어떤 타이머를 취소할지" 알아야 하기 때문
        //   delay에 안 담으면 clearTimeout이 취소할 대상을 모름 → 타이머가 계속 쌓임

        //*주의: clearTimeout(delay);을 setTimeout보다 먼저 써야 하는 이유는, 
        //       키를 누를 때마다 이전 타이머를 취소해야 하기 때문임

    </script>
</body>
</html>
